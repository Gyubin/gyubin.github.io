<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{{ page.title }} - Gyubin's devlog</title>
  <meta property="og:title" content="{{ page.title }} - Gyubin's devlog">
  <meta name="description" content="{{ page.subheading }}">
  <meta property="og:description" content="{{ page.subheading }}">
  <link rel="canonical" href="https://gyubin.github.io{{page.url}}">
  <meta property="og:url" content="https://gyubin.github.io{{page.url}}">
  <meta property="og:site_name" content="Gyubin's devlog">
  <meta property="og:type" content="article">
  <meta property="article:published_time" content="{{ page.date }}">
  <meta name="author" content="Gyubin Son">
  <meta property="og:author" content="Gyubin Son">
  <meta property="og:image" content="{{ page.thumbnail_img}}">

  <!-- Bootstrap Core CSS -->
  <link href="/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">

  <!-- Theme CSS -->
  <link href="/css/clean-blog.css" rel="stylesheet">

  <!-- Custom Fonts -->
  <link href="/vendor/font-awesome/css/font-awesome.min.css" rel="stylesheet" type="text/css">
  <link href='https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic' rel='stylesheet' type='text/css'>
  <link href='https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800' rel='stylesheet' type='text/css'>

  <script type="text/x-mathjax-config">MathJax.Hub.Config({tex2jax: {inlineMath: [['$','$'], ['\\(','\\)']]}});</script>
  <script type="text/javascript" async src="https://cdn.rawgit.com/mathjax/MathJax/2.7.1/MathJax.js?config=TeX-AMS_CHTML"></script>
  {% include google_analytics.html %}

  <!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
  <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
  <!--[if lt IE 9]>
        <script src="https://oss.maxcdn.com/libs/html5shiv/3.7.0/html5shiv.js"></script>
        <script src="https://oss.maxcdn.com/libs/respond.js/1.4.2/respond.min.js"></script>
    <![endif]-->
</head>


<body>
  {% include nav.html %}
  
  <!-- Page Header -->
  <!-- Set your background image for this header on the line below. -->
  <header class="intro-header" style="background-image: url('/img/post-bg.jpg')">
    <div class="container">
      <div class="row">
        <div class="col-lg-8 col-lg-offset-2 col-md-10 col-md-offset-1">
          <div class="post-heading">
            <h1>{{ page.title }}</h1>
            <h2 class="subheading">{{ page.subheading }}</h2>
            <span class="meta">Posted by <a href="https://github.com/gyubin">Gyubin</a> on {{ page.date | date: "%b %-d, %Y" }}</span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Post Content -->
  <article>
    <div class="container">
      <div class="row">
        <div class="col-lg-8 col-lg-offset-2 col-md-10 col-md-offset-1">
            {{ content }}
            {% if page.comments %}
              <div id="disqus_thread"></div>
              <script>
                var disqus_config = function () {
                  this.page.url = "https://gyubin.github.io" + "{{ page.url }}";
                  this.page.identifier = "{{ page.url }}";
                };
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://gyubin.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
              </script>
              <noscript>
                Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a>
              </noscript>
            {% endif %}
        </div>
      </div>
    </div>
  </article>

  <hr>

  <!-- Footer -->
  {% include footer.html %}

  <!-- jQuery -->
  <script src="/vendor/jquery/jquery.min.js"></script>

  <!-- Bootstrap Core JavaScript -->
  <script src="/vendor/bootstrap/js/bootstrap.min.js"></script>

  <!-- Contact Form JavaScript -->
  <script src="/js/jqBootstrapValidation.js"></script>
  <script src="/js/contact_me.js"></script>

  <!-- Theme JavaScript -->
  <script src="/js/clean-blog.min.js"></script>
  <script id="dsq-count-scr" src="//gyubin.disqus.com/count.js" async></script>
</body>

</html>
